name: CI


permissions:
  contents: write


on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  cpm-path: .cpm
  cpm-key: waterwall-1.1.0-cpm
  CCACHE_COMPILERCHECK: content
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_NOHASHDIR: 1
  CCACHE_SLOPPINESS: time_macros,file_macro,pch_defines,include_file_mtime,include_file_ctime
  CCACHE_COMPRESS: 1
  CCACHE_MAXSIZE: 20G
  CCACHE_PCH_EXTSUM: 1
  CCACHE_DEPEND: 1
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  android:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: android-arm32
            arch: armeabi-v7a
          - preset: android-arm64
            arch: arm64-v8a
          - preset: android-x86
            arch: x86
          - preset: android-x86-64
            arch: x86-64
            
    name: android-${{ matrix.arch }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ${{ env.cpm-path }}
            ${{ github.workspace }}/.ccache
          key: ${{ env.cpm-key }}-android-${{ matrix.arch }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ env.cpm-key }}-android-${{ matrix.arch }}-
            ${{ env.cpm-key }}-android-
            ${{ env.cpm-key }}-
          enableCrossOsArchive: false
      - name: Install dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache

      - name: Reset ccache statistics
        run: ccache --zero-stats

      - name: Configure CMake
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCPM_SOURCE_CACHE="${{ env.cpm-path }}"
      
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Waterwall-android-${{ matrix.arch }}
          path: ${{ github.workspace }}/build/${{ matrix.preset }}/Release/

      - name: Show ccache statistics
        run: ccache -sv

  bsd:
    strategy:
      fail-fast: false
      matrix:
        # preset: [freebsd, netbsd, openbsd]
        # arch: [arm64, x86_64]
        names: [freebsd-x86-64]
        preset: [freebsd]
        arch: [x86_64]
        include:
          - preset: freebsd
            version: "14.2"
            install: sudo pkg install -y cmake perl5 git ninja ccache
          # - preset: netbsd
          #   version: "10.1"
          #   install: sudo pkgin -y install cmake perl git ninja ccache
          # - preset: openbsd
          #   version: "7.6"
          #   install: sudo pkg_add cmake git ninja ccache
            
    name: ${{ matrix.names }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: cpa.sh {0}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ${{ env.cpm-path }}
            ${{ github.workspace }}/.ccache
          key: ${{ env.cpm-key }}-bsd-${{ matrix.names }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ env.cpm-key }}-bsd-${{ matrix.names }}-
            ${{ env.cpm-key }}-bsd-
            ${{ env.cpm-key }}-
          enableCrossOsArchive: false
         
      - name: Start BSD VM
        uses: cross-platform-actions/action@master
        with:
          operating_system: ${{ matrix.preset }}
          architecture: ${{ matrix.arch }}
          version: ${{ matrix.version }}

      - name: Configure CMake
        run: |
          ${{ matrix.install }}
          cmake -B build -G Ninja                    \
            -DCPM_SOURCE_CACHE=${{ env.cpm-path }}   \
            -DOPENSSL_CONFIGURE_VERBOSE=ON

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Waterwall-${{ matrix.names }}
          path: ${{ github.workspace }}/build/Waterwall

  ios:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: ios
            artifact: ios-arm64
          - preset: ios_sim
            artifact: ios-sim-arm64
    name: ${{ matrix.preset }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ${{ env.cpm-path }}
            ${{ github.workspace }}/.ccache
          key: ${{ env.cpm-key }}-ios-${{ matrix.preset }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ env.cpm-key }}-ios-${{ matrix.preset }}-
            ${{ env.cpm-key }}-ios-
            ${{ env.cpm-key }}-
          enableCrossOsArchive: false
      - name: Install dependencies on macOS
        run: |
          if ! command -v ccache >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install ccache
          fi

      - name: Reset ccache statistics
        run: ccache --zero-stats

      - name: Configure CMake
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCPM_SOURCE_CACHE="${{ env.cpm-path }}"

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${{ github.workspace }}/artifacts/${{ matrix.preset }}"
          build_dir="${{ github.workspace }}/build/${{ matrix.preset }}"
          rm -rf "$artifact_dir"
          mkdir -p "$artifact_dir"

          shopt -s nullglob
          product_dirs=( "$build_dir"/Release-* )
          if [ "${#product_dirs[@]}" -eq 0 ]; then
            echo "No Xcode Release-* output directory found under $build_dir"
            if [ -d "$build_dir" ]; then
              find "$build_dir" -maxdepth 3 -print
            fi
            exit 1
          fi

          for product_dir in "${product_dirs[@]}"; do
            cp -R "$product_dir"/. "$artifact_dir"/
          done

          if [ -z "$(find "$artifact_dir" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
            echo "No files copied into $artifact_dir"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Waterwall-${{ matrix.artifact }}
          path: ${{ github.workspace }}/artifacts/${{ matrix.preset }}/
          if-no-files-found: error
      - name: Show ccache statistics
        run: ccache -sv

  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: linux-gcc-x64
          - preset: linux-clang-x64
          - preset: linux-gcc-x64-old-cpu
          - preset: linux-gcc-arm64
          - preset: linux-gcc-arm64-old-cpu
          - preset: linux-clang-avx512f-x64

          
    name: ${{ matrix.preset }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ${{ env.cpm-path }}
            ${{ github.workspace }}/.ccache
          key: ${{ env.cpm-key }}-linux-${{ matrix.preset }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ env.cpm-key }}-linux-${{ matrix.preset }}-
            ${{ env.cpm-key }}-linux-
            ${{ env.cpm-key }}-
          enableCrossOsArchive: false
      - name: Install dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ccache iproute2

      - name: Install cross-compiler
        if: matrix.preset == 'linux-gcc-arm64' || matrix.preset == 'linux-gcc-arm64-old-cpu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Reset ccache statistics
        run: ccache --zero-stats

      - name: Configure CMake
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCPM_SOURCE_CACHE="${{ env.cpm-path }}"
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Unit tests
        if: matrix.preset == 'linux-gcc-x64'
        run: cmake --build --preset ${{ matrix.preset }} --target check_waterwall_unit_tests
      - name: Integration tests
        if: matrix.preset == 'linux-gcc-x64'
        run: ctest --preset linux-gcc -C Release --output-on-failure -L integration -LE privileged
      - name: Privileged integration tests
        if: matrix.preset == 'linux-gcc-x64'
        run: sudo -E ctest --preset linux-gcc -C Release --output-on-failure -L privileged
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Waterwall-${{ matrix.preset }}
          path: ${{ github.workspace }}/build/${{ matrix.preset }}/Release/
      - name: Show ccache statistics
        run: ccache -sv

  
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: macos
            arch: arm64
            runner: macos-15
    name: macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ${{ env.cpm-path }}
            ${{ github.workspace }}/.ccache
          key: ${{ env.cpm-key }}-macos-${{ matrix.arch }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ env.cpm-key }}-macos-${{ matrix.arch }}-
            ${{ env.cpm-key }}-macos-
            ${{ env.cpm-key }}-
          enableCrossOsArchive: false
      - name: Install dependencies on macOS
        if: runner.os == 'macOS'
        run: |
          if ! command -v ccache >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install ccache
          fi

      - name: Reset ccache statistics
        run: ccache --zero-stats

      - name: Configure CMake
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCPM_SOURCE_CACHE="${{ env.cpm-path }}"

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Waterwall-macos-${{ matrix.arch }}
          path: ${{ github.workspace }}/build/${{ matrix.preset }}/Release/
          if-no-files-found: error

      - name: Show ccache statistics
        run: ccache -sv

  msys2:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-clang-x64
            preset: windows-msys-clang
            msys: CLANG64
          - name: windows-mingw-x32
            preset: windows-mingw
            msys: MINGW32
          - name: windows-mingw-x64
            preset: windows-mingw
            msys: MINGW64
          - name: windows-mingw-ucrt-x64
            preset: windows-mingw
            msys: UCRT64
    name: ${{ matrix.name }}
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ${{ env.cpm-path }}
            ${{ github.workspace }}/.ccache
          key: ${{ env.cpm-key }}-msys2-${{ matrix.name }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ env.cpm-key }}-msys2-${{ matrix.name }}-
            ${{ env.cpm-key }}-msys2-
            ${{ env.cpm-key }}-
          enableCrossOsArchive: false
      - uses: msys2/setup-msys2@v2.31.1
        with:
          msystem: ${{ matrix.msys }}
          update: false
          pacboy: >-
            ccache:p
            cmake:p
            gcc:p
            make:p
            nasm:p
            ninja:p
      
      - name: Reset ccache statistics
        run: ccache --zero-stats

      - name: Configure CMake
        shell: msys2 {0}
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCPM_SOURCE_CACHE="${{ env.cpm-path }}"
          -DDISABLE_PRECOMPILED_HEADERS=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Waterwall-${{ matrix.name }}
          path: ${{ github.workspace }}/build/${{ matrix.preset }}/Release/

      - name: Show ccache statistics
        run: ccache -sv

  windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: windows-arm64
          - preset: windows-x86
          - preset: windows-x86-64
    name: ${{ matrix.preset }}
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ${{ env.cpm-path }}
            ${{ github.workspace }}/.ccache
          key: ${{ env.cpm-key }}-windows-${{ matrix.preset }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ env.cpm-key }}-windows-${{ matrix.preset }}-
            ${{ env.cpm-key }}-windows-
            ${{ env.cpm-key }}-
          enableCrossOsArchive: false
      - name: Install dependencies on Windows
        if: runner.os == 'Windows'
        run: |
          choco install -y jom nasm ccache
          echo "C:\Program Files\NASM" >> $ENV:GITHUB_PATH

      - name: Reset ccache statistics
        run: ccache --zero-stats

      - name: Configure CMake
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCPM_SOURCE_CACHE="${{ env.cpm-path }}"
        # -DOPENSSL_CONFIGURE_OPTIONS=no-asm

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Waterwall-${{ matrix.preset }}
          path: ${{ github.workspace }}/build/${{ matrix.preset }}/Release/

      - name: Show ccache statistics
        run: ccache -sv



  release:
      needs:
        # - android
        # - bsd
        # - ios
        - linux
        # - macos
        - msys2
        - windows

      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v5

        - name: Configure CMake
          run: |
            cmake -B build

        - name: Download artifacts
          uses: actions/download-artifact@v7
          with:
            path: downloaded_artifacts

        - name: Extract version
          run: |
            VERSION=$(cat ww/cmake/version.txt)
            echo "Project version: $VERSION"
            echo "VERSION=$VERSION" >> $GITHUB_ENV


        - name: Check if tag exists
          id: check_tag
          run: |
            git fetch --tags
            if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
              echo "exists=true" >> $GITHUB_OUTPUT
            else
              echo "exists=false" >> $GITHUB_OUTPUT
            fi

        - name: Create Git Tag
          if: steps.check_tag.outputs.exists == 'false'
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v${{ env.VERSION }}" -m "Release v${{ env.VERSION }}"
            git push origin "v${{ env.VERSION }}"

        - name: Zip release files
          if: steps.check_tag.outputs.exists == 'false'
          run: |
            ls -ln downloaded_artifacts
            mkdir -p zipped_artifacts
            for dir in downloaded_artifacts/*; do
              if [ -d "$dir" ]; then
                base=$(basename "$dir")
                cd "$dir" && zip -r "../../zipped_artifacts/${base}.zip" .
                cd ../..
              fi
            done


        - name: Create GitHub Release
          if: steps.check_tag.outputs.exists == 'false'
          uses: softprops/action-gh-release@v3
          with:
            tag_name: v${{ env.VERSION }}
            files: |
              zipped_artifacts/*.zip
